const PublicationBias={
analyze(results){const{processed,tau2}=results;const y=processed.map(s=>s.yi),se=processed.map(s=>Math.sqrt(s.vi));return{egger:this.eggerTest(y,se),begg:this.beggTest(y,se),trimFill:this.trimAndFill(y,se,tau2),petPeese:this.petPeese(y,se),summary:this.summarize(y,se)}},

const CrossValidationI2={
analyze(studies,options={}){const{effectMeasure='OR',kFolds=5,nReps=15}=options;

let cvI2Values=[],apparentI2Values=[];for(let rep=0;rep<nReps;rep++){const shuffled=[...processed].sort(()=>Math.random()-0.5);const foldSize=Math.ceil(n/kFolds);let cvResiduals=[];

const ConformalPI={
analyze(results,alpha=0.05){const{processed,tau2}=results;const n=processed.length;if(n<5)return{applicable:false};
const y=processed.map(s=>s.yi),se=processed.map(s=>Math.sqrt(s.vi));const w=se.map(s=>1/(s*s+tau2)),sumW=Stats.sum(w);const pooled=Stats.sum(y.map((yi,i)=>w[i]*yi))/sumW;

const CSTREAM={
analyze(results,targetPopulation={}){const{processed,effects}=results;const transportWeights=this.calculateTransportWeights(processed,targetPopulation);const weightedEffects=this.weightedPooling(processed,transportWeights);const generalizabilityIndex=this.calcGeneralizabilityIndex(processed,targetPopulation);const participationBias=this.assessParticipationBias(processed,targetPopulation);

calculateTransportWeights(studies,target){if(!target.meanAge&&!target.propMale)return studies.map(()=>1);return studies.map(s=>{let w=1;if(target.meanAge&&s.meanAge)w*=Math.exp(-Math.abs((s.meanAge||60)-(target.meanAge||60))/20);if(target.propMale&&s.propMale)w*=Math.exp(-Math.abs((s.propMale||0.5)-(target.propMale||0.5))*2);return Math.max(0.1,w)})},

const CumulativeNMA={
analyze(studies,options={}){const{effectMeasure='OR'}=options;const sorted=[...studies].sort((a,b)=>(a.year||2000)-(b.year||2000));const cumulative=[];let runningStudies=[];
sorted.forEach(study=>{runningStudies.push(study);if(runningStudies.length<2)return;
try{const processed=FrequentistNMA.calcEffects(runningStudies,effectMeasure);const y=processed.map(s=>s.yi),v=processed.map(s=>s.vi),w=v.map(vi=>1/vi);const pooled=Stats.sum(y.map((yi,i)=>w[i]*yi))/Stats.sum(w);const se=Math.sqrt(1/Stats.sum(w));

const TreatmentRanking={
calcPScores(effectsResult,treatments,direction='lower'){const{effects,vcov,hksjFactor}=effectsResult;const pScores={};treatments.forEach((ti,i)=>{let sumP=0,count=0;treatments.forEach((tj,j)=>{if(i!==j){const ei=effects[ti],ej=effects[tj],diff=ei.estimate-ej.estimate;const idxI=treatments.indexOf(ti)-1,idxJ=treatments.indexOf(tj)-1;let varDiff;if(idxI<0)varDiff=vcov[idxJ][idxJ];else if(idxJ<0)varDiff=vcov[idxI][idxI];else varDiff=vcov[idxI][idxI]+vcov[idxJ][idxJ]-2*(vcov[idxI][idxJ]||0);const se=Math.sqrt(Math.max(0.0001,varDiff)*hksjFactor),z=diff/se;sumP+=direction==='lower'?Stats.pnorm(-z):Stats.pnorm(z);count++}});pScores[ti]=count>0?sumP/count:0.5});return pScores},

const CNMA={
analyze(studies,options={}){const{separator='+',effectMeasure='OR'}=options;const tSet=new Set();studies.forEach(s=>{tSet.add(s.treatment1);tSet.add(s.treatment2)});const treatments=Array.from(tSet).sort();const components=new Set(),treatmentComponents={};treatments.forEach(t=>{const parts=t.split(separator).map(p=>p.trim()).filter(p=>p);treatmentComponents[t]=parts;parts.forEach(p=>components.add(p))});const compList=Array.from(components).sort();if(compList.length<2)return{applicable:false,message:'Need multiple components'};

const y=processed.map(s=>s.yi),v=processed.map(s=>s.vi),W=v.map(vi=>1/vi),p=compList.length;const XtWX=Matrix.zeros(p,p),XtWy=Array(p).fill(0);for(let i=0;i<n;i++)for(let j=0;j<p;j++){XtWy[j]+=X[i][j]*W[i]*y[i];for(let k=0;k<p;k++)XtWX[j][k]+=X[i][j]*W[i]*X[i][k]}
try{const beta=Matrix.solve(XtWX,XtWy),vcov=Matrix.inverse(XtWX);const componentEffects=compList.map((c,i)=>({component:c,estimate:beta[i],se:Math.sqrt(vcov[i][i]),ci_lower:beta[i]-1.96*Math.sqrt(vcov[i][i]),ci_upper:beta[i]+1.96*Math.sqrt(vcov[i][i]),pValue:2*(1-Stats.pnorm(Math.abs(beta[i]/Math.sqrt(vcov[i][i]))))}));let Q=0;for(let i=0;i<n;i++){let f=0;for(let j=0;j<p;j++)f+=X[i][j]*beta[j];Q+=W[i]*(y[i]-f)**2}return{applicable:true,components:compList,componentEffects,heterogeneity:{Q,df:n-p,I2:Math.max(0,((Q-(n-p))/Q)*100)}}}catch(e){return{applicable:false,message:'CNMA failed'}}}};

const NetworkMetaRegression={
analyze(studies,covariate,options={}){const{effectMeasure='OR'}=options;if(!covariate||studies.some(s=>s[covariate]===undefined))return{applicable:false,message:'Covariate incomplete'};const processed=FrequentistNMA.calcEffects(studies,effectMeasure);const x=processed.map(s=>s[covariate]),y=processed.map(s=>s.yi),v=processed.map(s=>s.vi),xMean=Stats.mean(x),xC=x.map(xi=>xi-xMean),n=processed.length,W=v.map(vi=>1/vi);let tau2=0;

const CINeMA={
assess(results,studies,options={}){const{reference}=options;const assessments=[];results.treatments.forEach(t=>{if(t===reference)return;const effect=results.effects.effects[t];const directEvidence=results.consistency.find(c=>(c.t1===t&&c.t2===reference)||(c.t2===t&&c.t1===reference));const domains={withinStudyBias:this.assessROB(studies,t,reference),reportingBias:{concern:studies.length<10?'unclear':'some',reason:studies.length<10?'<10 studies':'Cannot rule out'},indirectness:this.assessIndirectness(directEvidence),imprecision:this.assessImprecision(effect),heterogeneity:this.assessHeterogeneity(results.heterogeneity),incoherence:{concern:'unclear',reason:'Not assessed'}};const concerns=Object.values(domains).map(d=>d.concern);const major=concerns.filter(c=>c==='major').length,some=concerns.filter(c=>c==='some').length;let overall;if(major>=2)overall='very-low';else if(major===1||some>=2)overall='low';else if(some===1)overall='moderate';else overall='high';assessments.push({comparison:`${t} vs ${reference}`,treatment:t,domains,overall})});return{assessments,summary:{high:assessments.filter(a=>a.overall==='high').length,moderate:assessments.filter(a=>a.overall==='moderate').length,low:assessments.filter(a=>a.overall==='low').length,veryLow:assessments.filter(a=>a.overall==='very-low').length}}},
assessROB(studies,t1,t2){const rel=studies.filter(s=>(s.treatment1===t1||s.treatment2===t1)&&(s.treatment1===t2||s.treatment2===t2));const withROB=rel.filter(s=>s.rob);if(withROB.length===0)return{concern:'unclear',reason:'No ROB'};const high=withROB.filter(s=>s.rob==='high').length/withROB.length;if(high>0.5)return{concern:'major',reason:'Majority high'};if(high>0.2)return{concern:'some',reason:'Some high'};return{concern:'none',reason:'Low risk'}},
assessIndirectness(directEvidence){if(!directEvidence||directEvidence.nStudies===0)return{concern:'major',reason:'Only indirect'};if(directEvidence.nStudies<3)return{concern:'some',reason:'Limited direct'};return{concern:'none',reason:'Adequate'}},

const GRADE_NMA={
assess(results,studies,options={}){const{reference}=options;const assessments=[];results.treatments.forEach(t=>{if(t===reference)return;const effect=results.effects.effects[t];const rob=this.assessROB(studies,t,reference);const inconsistency=this.assessInconsistency(results);const indirectness=this.assessIndirectness(results.consistency,t,reference);const imprecision=this.assessImprecision(effect);const pubBias={concern:'Unlikely',downgrade:0,reason:'Assessed'};const domains={rob,inconsistency,indirectness,imprecision,pubBias};let grade=4;Object.values(domains).forEach(d=>{if(d.downgrade===2)grade-=2;else if(d.downgrade===1)grade-=1});grade=Math.max(1,grade);const gradeLabels=['','Very Low','Low','Moderate','High'];assessments.push({comparison:`${t} vs ${reference}`,treatment:t,domains,grade,gradeLabel:gradeLabels[grade]})});return{assessments,summary:{high:assessments.filter(a=>a.grade===4).length,moderate:assessments.filter(a=>a.grade===3).length,low:assessments.filter(a=>a.grade===2).length,veryLow:assessments.filter(a=>a.grade===1).length}}},

const EValues={

const DoseResponseNMA={

fitEmax(data){let bestFit={RSS:Infinity};for(let ED50=0.1;ED50<100;ED50*=1.5){const X=data.map(d=>d.dose/(ED50+d.dose)),y=data.map(d=>d.yi),w=data.map(d=>1/d.vi);const sumWX=Stats.sum(X.map((x,i)=>w[i]*x)),sumWY=Stats.sum(y.map((yi,i)=>w[i]*yi));const sumW=Stats.sum(w),sumWXX=Stats.sum(X.map((x,i)=>w[i]*x*x)),sumWXY=Stats.sum(X.map((x,i)=>w[i]*x*y[i]));const Emax=(sumW*sumWXY-sumWX*sumWY)/(sumW*sumWXX-sumWX*sumWX);const E0=(sumWY-Emax*sumWX)/sumW;let RSS=0;for(let i=0;i<data.length;i++){const pred=E0+Emax*X[i];RSS+=w[i]*(y[i]-pred)**2}if(RSS<bestFit.RSS)bestFit={E0,Emax,ED50,RSS}}return bestFit}};

function renderNetworkGraph(studies,treatments){if(typeof Plotly==='undefined')return;const colors=getThemeColors();const n=treatments.length,nodeX=[],nodeY=[];for(let i=0;i<n;i++){const angle=2*Math.PI*i/n-Math.PI/2;nodeX.push(Math.cos(angle));nodeY.push(Math.sin(angle))}const edgeX=[],edgeY=[],edgeW=[];const edgeMap=new Map();studies.forEach(s=>{const k=[s.treatment1,s.treatment2].sort().join('|');edgeMap.set(k,(edgeMap.get(k)||0)+1)});edgeMap.forEach((cnt,k)=>{const[t1,t2]=k.split('|'),i1=treatments.indexOf(t1),i2=treatments.indexOf(t2);if(i1>=0&&i2>=0){edgeX.push(nodeX[i1],nodeX[i2],null);edgeY.push(nodeY[i1],nodeY[i2],null);edgeW.push(cnt)}});const edgeTrace={type:'scatter',mode:'lines',x:edgeX,y:edgeY,line:{color:colors.edge,width:2},hoverinfo:'skip'};const nodeTrace={type:'scatter',mode:'markers+text',x:nodeX,y:nodeY,text:treatments,textposition:'top center',textfont:{color:colors.text,size:12,family:'Outfit'},marker:{size:treatments.map(t=>{let cnt=0;studies.forEach(s=>{if(s.treatment1===t||s.treatment2===t)cnt++});return 20+cnt*4}),color:colors.node,line:{color:'white',width:2}},hoverinfo:'text'};Plotly.newPlot('networkPlot',[edgeTrace,nodeTrace],{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{visible:false,range:[-1.5,1.5]},yaxis:{visible:false,range:[-1.5,1.5],scaleanchor:'x'},margin:{l:20,r:20,t:20,b:20},showlegend:false},{responsive:true})}

function renderForestPlot(results){if(typeof Plotly==='undefined')return;const colors=getThemeColors();const{effects,treatments,reference}=results;const effectMeasure=AppState.effectMeasure,isRatio=['OR','RR','HR'].includes(effectMeasure);const nonRef=treatments.filter(t=>t!==reference).map(t=>({treatment:t,...effects.effects[t]})).sort((a,b)=>a.estimate-b.estimate);const y=nonRef.map(d=>d.treatment),x=nonRef.map(d=>isRatio?Math.exp(d.estimate):d.estimate),xL=nonRef.map(d=>isRatio?Math.exp(d.ci_lower):d.ci_lower),xU=nonRef.map(d=>isRatio?Math.exp(d.ci_upper):d.ci_upper);const hasPred=nonRef[0]?.pi_lower!==undefined;const traces=[];if(hasPred){const piL=nonRef.map(d=>isRatio?Math.exp(d.pi_lower):d.pi_lower),piU=nonRef.map(d=>isRatio?Math.exp(d.pi_upper):d.pi_upper);traces.push({type:'scatter',mode:'markers',name:'95% PI',x:x,y:y,error_x:{type:'data',symmetric:false,array:piU.map((u,i)=>u-x[i]),arrayminus:x.map((v,i)=>v-piL[i]),color:colors.secondary,thickness:1,width:4},marker:{size:0,color:'transparent'},hoverinfo:'skip'})}traces.push({type:'scatter',mode:'markers',name:'95% CI',x:x,y:y,error_x:{type:'data',symmetric:false,array:xU.map((u,i)=>u-x[i]),arrayminus:x.map((v,i)=>v-xL[i]),color:colors.node,thickness:2,width:8},marker:{size:14,color:colors.node,symbol:'diamond',line:{color:'white',width:1}},hovertemplate:'%{y}<br>%{x:.2f}<extra></extra>'});const nullVal=isRatio?1:0;Plotly.newPlot('forestPlot',traces,{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{title:{text:`${effectMeasure} vs ${reference}`,font:{size:12}},type:isRatio?'log':'linear',gridcolor:colors.grid,tickfont:{color:colors.text}},yaxis:{gridcolor:colors.grid,tickfont:{color:colors.text}},shapes:[{type:'line',x0:nullVal,x1:nullVal,y0:-0.5,y1:y.length-0.5,line:{color:colors.danger,width:2,dash:'dash'}}],margin:{l:130,r:40,t:20,b:60},font:{color:colors.text},showlegend:hasPred,legend:{x:1,y:1,xanchor:'right',bgcolor:'rgba(0,0,0,0)'}},{responsive:true})}

function renderThresholdAnalysis(results){const container=document.getElementById('thresholdContainer');const thresholds=ThresholdAnalysis.analyze(results,AppState.reference,AppState.effectMeasure);let html='<table class="data-table"><thead><tr><th>Treatment</th><th>Est</th><th>Sig</th><th>Threshold</th><th>Robustness</th></tr></thead><tbody>';thresholds.forEach(t=>{const cls=t.interpretation==='Robust'?'text-success':t.interpretation==='Moderately robust'?'text-warning':'text-danger';html+=`<tr><td>${t.treatment}</td><td class="font-mono">${t.estimate.toFixed(2)}</td><td>${t.significant?'✓':'—'}</td><td class="font-mono">${t.threshold}</td><td class="${cls}">${t.interpretation}</td></tr>`});container.innerHTML=html+'</tbody></table>'}

function renderBayesianResults(bayes){const container=document.getElementById('bayesianResults');const{summary,diagnostics}=bayes;let html=`<div class="stat-grid mb-4"><div class="stat-card"><div class="stat-card__value">${summary.tau2.mean.toFixed(4)}</div><div class="stat-card__label">τ² (mean)</div></div><div class="stat-card"><div class="stat-card__value">${summary.tau2.median.toFixed(4)}</div><div class="stat-card__label">τ² (median)</div></div><div class="stat-card ${diagnostics.converged?'stat-card--success':'stat-card--danger'}"><div class="stat-card__value">${diagnostics.rhat.tau2.toFixed(3)}</div><div class="stat-card__label">R̂ (τ²)</div></div><div class="stat-card"><div class="stat-card__value">${diagnostics.ess.tau2.toFixed(0)}</div><div class="stat-card__label">ESS</div></div></div>`;html+=`<div class="alert ${diagnostics.converged?'alert--success':'alert--warning'} mb-4"><span class="alert__icon">${diagnostics.converged?'✓':'⚠'}</span><div class="alert__text">${diagnostics.converged?'MCMC converged (R̂ < 1.1)':'May not have converged'}</div></div>`;html+='<table class="data-table"><thead><tr><th>Treatment</th><th>Mean</th><th>SD</th><th>95% CrI</th></tr></thead><tbody>';Object.entries(summary.effects).forEach(([t,e])=>{if(t===bayes.reference)return;const isRatio=['OR','RR','HR'].includes(bayes.effectMeasure);const est=isRatio?Math.exp(e.mean):e.mean;const ciL=isRatio?Math.exp(e.ci[0]):e.ci[0];const ciU=isRatio?Math.exp(e.ci[1]):e.ci[1];html+=`<tr><td>${t}</td><td class="font-mono">${est.toFixed(3)}</td><td class="font-mono">${e.sd.toFixed(3)}</td><td class="font-mono">(${ciL.toFixed(3)}, ${ciU.toFixed(3)})</td></tr>`});html+=`</tbody></table><p class="text-xs text-secondary mt-3">DIC: ${summary.DIC.DIC.toFixed(1)} | pD: ${summary.DIC.pD.toFixed(1)}</p>`;container.innerHTML=html;renderTracePlots(bayes);renderPosteriorPlots(bayes)}

function renderTracePlots(bayes){if(typeof Plotly==='undefined')return;const colors=getThemeColors();const traces=bayes.chains.map((chain,c)=>({type:'scatter',mode:'lines',y:chain.tau2,name:`Chain ${c+1}`,line:{width:1},opacity:0.7}));Plotly.newPlot('tracePlot',traces,{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{title:'Iteration',gridcolor:colors.grid,tickfont:{color:colors.text}},yaxis:{title:'τ²',gridcolor:colors.grid,tickfont:{color:colors.text}},margin:{l:60,r:20,t:20,b:50},font:{color:colors.text},showlegend:true,legend:{x:1,y:1}},{responsive:true})}

function renderPosteriorPlots(bayes){if(typeof Plotly==='undefined')return;const colors=getThemeColors();const tau2=bayes.samples.tau2;const min=Math.min(...tau2),max=Math.max(...tau2);const bins=50,binWidth=(max-min)/bins||0.01;const hist=Array(bins).fill(0);tau2.forEach(v=>{const idx=Math.min(bins-1,Math.max(0,Math.floor((v-min)/binWidth)));hist[idx]++});const x=Array(bins).fill(0).map((_,i)=>min+(i+0.5)*binWidth);const y=hist.map(h=>h/tau2.length/binWidth);Plotly.newPlot('posteriorPlot',[{type:'scatter',mode:'lines',x:x,y:y,fill:'tozeroy',line:{color:colors.accent},fillcolor:'rgba(6,182,212,0.3)'}],{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{title:'τ²',gridcolor:colors.grid,tickfont:{color:colors.text}},yaxis:{title:'Density',gridcolor:colors.grid,tickfont:{color:colors.text}},margin:{l:60,r:20,t:20,b:50},font:{color:colors.text}},{responsive:true})}

getElementById('petPeeseResults').innerHTML='<p class="text-secondary">Insufficient data</p>'}}

function renderCumulativeResults(cumul){const container=document.getElementById('cumulativeResults');if(!cumul.cumulative||cumul.cumulative.length===0){container.innerHTML='<p class="text-secondary">Insufficient data</p>';return}let html=`<p class="text-sm mb-4">${cumul.interpretation}</p>`;if(cumul.firstSignificant){html+=`<div class="alert alert--info mb-4"><span class="alert__icon">📅</span><div class="alert__text">First significant: ${cumul.firstSignificant.year} (n=${cumul.firstSignificant.nStudies})</div></div>`}container.innerHTML=html;if(typeof Plotly==='undefined')return;const colors=getThemeColors();const isRatio=['OR','RR','HR'].includes(AppState.effectMeasure);const x=cumul.cumulative.map(c=>isRatio?Math.exp(c.estimate):c.estimate);const xL=cumul.cumulative.map(c=>isRatio?Math.exp(c.ci[0]):c.ci[0]);const xU=cumul.cumulative.map(c=>isRatio?Math.exp(c.ci[1]):c.ci[1]);const y=cumul.cumulative.map(c=>`${c.year} (n=${c.nStudies})`);Plotly.newPlot('cumulativePlot',[{type:'scatter',mode:'markers',x:x,y:y,error_x:{type:'data',symmetric:false,array:xU.map((u,i)=>u-x[i]),arrayminus:x.map((v,i)=>v-xL[i]),color:colors.node,thickness:2,width:4},marker:{size:10,color:colors.node}}],{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{title:'Cumulative Effect',type:isRatio?'log':'linear',gridcolor:colors.grid,tickfont:{color:colors.text}},yaxis:{gridcolor:colors.grid,tickfont:{color:colors.text}},shapes:[{type:'line',x0:isRatio?1:0,x1:isRatio?1:0,y0:-0.5,y1:y.length-0.5,line:{color:colors.danger,width:2,dash:'dash'}}],margin:{l:120,r:20,t:20,b:50},font:{color:colors.text}},{responsive:true})}

:{title:'Effect',gridcolor:colors.grid,tickfont:{color:colors.text}},margin:{l:60,r:20,t:20,b:50},font:{color:colors.text},showlegend:false},{responsive:true})}hideLoading();announce('Meta-regression complete')}catch(e){hideLoading();alert('Meta-regression failed: '+e.message)}}

async function runCNMA(){showLoading('Running CNMA...',30);await new Promise(r=>setTimeout(r,100));try{const sep=document.getElementById('componentSeparator').value||'+';AppState.cnmaResults=CNMA.analyze(AppState.studies,{separator:sep,effectMeasure:AppState.effectMeasure});if(!AppState.cnmaResults.applicable){hideLoading();alert(AppState.cnmaResults.message);return}const res=AppState.cnmaResults,isRatio=['OR','RR','HR'].includes(AppState.effectMeasure);let html='<table class="data-table"><thead><tr><th>Component</th><th>Estimate</th><th>SE</th><th>95% CI</th><th>p</th></tr></thead><tbody>';res.componentEffects.forEach(c=>{const est=isRatio?Math.exp(c.estimate):c.estimate,ciL=isRatio?Math.exp(c.ci_lower):c.ci_lower,ciU=isRatio?Math.exp(c.ci_upper):c.ci_upper;html+=`<tr><td>${c.component}</td><td class="font-mono">${est.toFixed(3)}</td><td class="font-mono">${c.se.toFixed(3)}</td><td class="font-mono">(${ciL.toFixed(3)}, ${ciU.toFixed(3)})</td><td class="font-mono">${c.pValue<0.001?'<0.001':c.pValue.toFixed(3)}</td></tr>`});document.getElementById('cnmaResults').innerHTML=html+'</tbody></table>';if(typeof Plotly!=='undefined'){const colors=getThemeColors();const y=res.componentEffects.map(c=>c.component),x=res.componentEffects.map(c=>isRatio?Math.exp(c.estimate):c.estimate),xL=res.componentEffects.map(c=>isRatio?Math.exp(c.ci_lower):c.ci_lower),xU=res.componentEffects.map(c=>isRatio?Math.exp(c.ci_upper):c.ci_upper);Plotly.newPlot('cnmaForestPlot',[{type:'scatter',mode:'markers',x:x,y:y,error_x:{type:'data',symmetric:false,array:xU.map((u,i)=>u-x[i]),arrayminus:x.map((v,i)=>v-xL[i]),color:colors.secondary,thickness:2,width:8},marker:{size:14,color:colors.secondary,symbol:'diamond'}}],{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{type:isRatio?'log':'linear',gridcolor:colors.grid,tickfont:{color:colors.text}},yaxis:{gridcolor:colors.grid,tickfont:{color:colors.text}},shapes:[{type:'line',x0:isRatio?1:0,x1:isRatio?1:0,y0:-0.5,y1:y.length-0.5,line:{color:colors.danger,width:2,dash:'dash'}}],margin:{l:100,r:20,t:20,b:50},font:{color:colors.text}},{responsive:true})}hideLoading();announce('CNMA complete')}catch(e){hideLoading();alert('CNMA failed: '+e.message)}}

async function runCSTREAM(){if(!AppState.results){alert('Run analysis first');return}showLoading('Running C-STREAM...',30);await new Promise(r=>setTimeout(r,100));try{const targetAge=parseFloat(document.getElementById('targetAge').value)||65;const targetMale=parseFloat(document.getElementById('targetMale').value)||0.5;AppState.cstreamResults=CSTREAM.analyze(AppState.results,{meanAge:targetAge,propMale:targetMale});renderCSTREAMResults(AppState.cstreamResults);hideLoading();switchTab('transportability');announce('C-STREAM complete')}catch(e){hideLoading();alert('C-STREAM failed: '+e.message)}}

async function runCumulative(){if(AppState.studies.length<3){alert('Need ≥3 studies');return}showLoading('Running cumulative analysis...',30);await new Promise(r=>setTimeout(r,100));try{AppState.cumulativeResults=CumulativeNMA.analyze(AppState.studies,{effectMeasure:AppState.effectMeasure});renderCumulativeResults(AppState.cumulativeResults);hideLoading();switchTab('cumulative');announce('Cumulative analysis complete')}catch(e){hideLoading();alert('Cumulative analysis failed: '+e.message)}}

async function runDoseResponse(){showLoading('Running dose-response...',30);await new Promise(r=>setTimeout(r,100));try{const modelType=document.getElementById('doseModelSelect').value;AppState.doseResponseResults=DoseResponseNMA.analyze(AppState.studies,{effectMeasure:AppState.effectMeasure,modelType});if(!AppState.doseResponseResults.applicable){hideLoading();document.getElementById('doseResults').innerHTML=`<p class="text-secondary">${AppState.doseResponseResults.message}</p>`;return}const dr=AppState.doseResponseResults;document.getElementById('doseResults').innerHTML=`<div class="stat-grid"><div class="stat-card"><div class="stat-card__value">${dr.optimalDose?.dose?.toFixed(1)||'N/A'}</div><div class="stat-card__label">Optimal Dose</div></div><div class="stat-card"><div class="stat-card__value">${dr.modelType}</div><div class="stat-card__label">Model</div></div></div><p class="text-sm text-secondary mt-2">${dr.interpretation}</p>`;if(typeof Plotly!=='undefined'&&dr.doseEffectCurve){const colors=getThemeColors();const isRatio=['OR','RR','HR'].includes(AppState.effectMeasure);Plotly.newPlot('doseResponsePlot',[{type:'scatter',mode:'lines',x:dr.doseEffectCurve.map(d=>d.dose),y:dr.doseEffectCurve.map(d=>isRatio?Math.exp(d.effect):d.effect),line:{color:colors.accent,width:3}},{type:'scatter',mode:'markers',x:dr.doseData.map(d=>d.dose),y:dr.doseData.map(d=>isRatio?Math.exp(d.yi):d.yi),marker:{size:10,color:colors.node},text:dr.doseData.map(d=>d.study),hoverinfo:'text'}],{paper_bgcolor:colors.background,plot_bgcolor:colors.background,xaxis:{title:'Dose',gridcolor:colors.grid,tickfont:{color:colors.text}},yaxis:{title:'Effect',gridcolor:colors.grid,tickfont:{color:colors.text}},shapes:[{type:'line',x0:0,x1:Math.max(...dr.doseData.map(d=>d.dose))*1.2,y0:isRatio?1:0,y1:isRatio?1:0,line:{color:colors.danger,width:1,dash:'dash'}}],margin:{l:60,r:20,t:20,b:50},font:{color:colors.text}},{responsive:true})}hideLoading();announce('Dose-response complete')}catch(e){hideLoading();alert('Dose-response failed: '+e.message)}}

document.addEventListener('DOMContentLoaded',()=>{initializePanels();const savedTheme=localStorage.getItem('nma-pro-theme');if(savedTheme){document.documentElement.setAttribute('data-theme',savedTheme);document.getElementById('themeIcon').textContent=savedTheme==='light'?'☀️':'🌙'}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
document.getElementById('themeToggle').addEventListener('click',toggleTheme);
document.getElementById('runAnalysisBtn').addEventListener('click',runAnalysis);
document.getElementById('addStudyBtn').addEventListener('click',addStudy);
document.getElementById('loadDemoBtn').addEventListener('click',loadDemo);
document.getElementById('clearAllBtn').addEventListener('click',clearAll);
document.getElementById('recheckBtn').addEventListener('click',()=>{if(AppState.studies.length>0){AppState.guardian=NetworkGuardian.analyze(AppState.studies);updateGuardianPanel(AppState.guardian)}});
document.getElementById('runBayesianBtn').addEventListener('click',runBayesian);
document.getElementById('runPubBiasBtn').addEventListener('click',runPubBias);
document.getElementById('runMetaRegBtn').addEventListener('click',runMetaRegression);
document.getElementById('runCNMABtn').addEventListener('click',runCNMA);
document.getElementById('runCSTREAMBtn').addEventListener('click',runCSTREAM);
document.getElementById('runCumulativeBtn').addEventListener('click',runCumulative);
document.getElementById('runDoseBtn').addEventListener('click',runDoseResponse);
document.getElementById('exportJsonBtn').addEventListener('click',exportJSON);
document.getElementById('exportCsvBtn').addEventListener('click',exportCSV);
document.getElementById('exportRCodeBtn').addEventListener('click',exportRCode);
document.getElementById('exportPythonBtn').addEventListener('click',exportPython);
document.getElementById('generateReportBtn').addEventListener('click',generateReport);
document.getElementById('importJsonBtn').addEventListener('click',()=>{document.getElementById('fileInput').setAttribute('accept','.json');document.getElementById('fileInput').click()});
document.getElementById('importCsvBtn').addEventListener('click',()=>{document.getElementById('fileInput').setAttribute('accept','.csv');document.getElementById('fileInput').click()});
document.getElementById('fileInput').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=evt=>{try{if(file.name.endsWith('.json')){const data=JSON.parse(evt.target.result);if(data.studies){AppState.studies=data.studies;if(data.options?.reference)AppState.reference=data.options.reference;renderStudyTable();announce('JSON imported')}}else if(file.name.endsWith('.csv')){const studies=importCSV(evt.target.result);if(studies.length>0){AppState.studies=studies;renderStudyTable();announce(`CSV imported: ${studies.length} studies`)}}}catch(err){alert('Import failed: '+err.message)}};reader.readAsText(file);e.target.value=''});
document.getElementById('referenceSelect').addEventListener('change',e=>AppState.reference=e.target.value);
renderStudyTable();
initWorker().then(ok=>console.log('NMA Pro v6.2 initialized'+(ok?' with Web Worker ⚡':' (sync mode)')));
console.log('Features: Bayesian MCMC, Publication Bias Suite, C-STREAM, Dose-Response, CV-I², Conformal PI, GRADE-NMA, Cumulative NMA, Worker Optimization')})
